name: Docker Image

on:
  pull_request:
    branches: [main, master]
    paths:
      - ".github/workflows/docker.yml"
      - "Dockerfile"
      - ".dockerignore"
      - "requirements.txt"
      - "scripts/**"
      - "app/**"
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      push_image:
        description: "Push the manually built image with the edge tag"
        required: false
        type: boolean
        default: false

env:
  IMAGE_NAME: ${{ vars.DOCKERHUB_REPOSITORY != '' && vars.DOCKERHUB_REPOSITORY || 'local/angemedia-gateway' }}
  PUBLISH_IMAGE: ${{ github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.push_image) }}

jobs:
  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read

    steps:
      - uses: actions/checkout@v5

      - name: Set up QEMU for ARM64 emulation
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Validate DockerHub settings
        if: env.PUBLISH_IMAGE == 'true'
        run: |
          if [ -z "${{ vars.DOCKERHUB_REPOSITORY }}" ]; then
            echo "Set repository variable DOCKERHUB_REPOSITORY to your DockerHub image, for example: dockerhub-user/angemedia-gateway"
            exit 1
          fi
          if [ -z "${{ secrets.DOCKERHUB_USERNAME }}" ] || [ -z "${{ secrets.DOCKERHUB_TOKEN }}" ]; then
            echo "Set repository secrets DOCKERHUB_USERNAME and DOCKERHUB_TOKEN"
            exit 1
          fi

      - name: Log in to DockerHub
        if: env.PUBLISH_IMAGE == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=pr
            type=ref,event=tag
            type=raw,value=edge,enable=${{ github.event_name == 'workflow_dispatch' }}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') && !contains(github.ref, '-') }}

      - name: Build multi-architecture image and optionally push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ env.PUBLISH_IMAGE == 'true' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
